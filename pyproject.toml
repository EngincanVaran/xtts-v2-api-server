[tool.ruff]
target-version = "py311"
line-length = 100
src = ["xtts_server"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (undefined names, unused imports, etc.)
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear (likely bugs and design problems)
    "UP",  # pyupgrade (modernise syntax for target Python version)
    "C4",  # flake8-comprehensions (unnecessary list/dict/set calls)
    "SIM", # flake8-simplify (simplifiable code patterns)
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter, not linter
    "B008",   # do not perform function call in default args (FastAPI uses this pattern)
    "SIM108", # ternary operator — sometimes less readable than if/else
    "UP007",  # use X | Y for union types — keep explicit Optional for clarity
]

[tool.ruff.lint.isort]
known-first-party = ["xtts_server"]
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
